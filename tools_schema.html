<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Tools Schema</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
  --dim: #8b949e; --link: #58a6ff; --green: #3fb950; --red: #f85149;
  --orange: #d29922; --purple: #8957e5; --cyan: #39d2c0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; line-height:1.6; }
a { color:var(--link); text-decoration:none; }

.container { max-width:1200px; margin:0 auto; padding:20px; }

/* Header */
.header { text-align:center; padding:40px 0 30px; border-bottom:1px solid var(--border); margin-bottom:30px; }
.header h1 { font-size:28px; margin-bottom:8px; }
.header .subtitle { color:var(--dim); font-size:14px; }
.stats { display:flex; justify-content:center; gap:24px; margin-top:16px; }
.stats .stat { text-align:center; }
.stats .stat-num { font-size:24px; font-weight:700; color:var(--link); }
.stats .stat-label { font-size:11px; color:var(--dim); text-transform:uppercase; }

/* Category nav */
.nav { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; position:sticky; top:0; background:var(--bg); padding:12px 0; z-index:10; border-bottom:1px solid var(--border); }
.nav-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--dim); cursor:pointer; font-size:12px; transition:all 0.2s; }
.nav-btn:hover { border-color:var(--link); color:var(--text); }
.nav-btn.active { background:var(--link); color:white; border-color:var(--link); }
.nav-btn .count { opacity:0.6; margin-left:4px; }

/* Search */
.search { margin-bottom:20px; }
.search input { width:100%; padding:10px 16px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; }
.search input:focus { outline:none; border-color:var(--link); }

/* Category */
.category { margin-bottom:32px; }
.category h2 { font-size:18px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.cat-icon { font-size:20px; }
.cat-count { font-size:12px; color:var(--dim); font-weight:400; }

/* Tool card */
.tool { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:12px; overflow:hidden; transition:border-color 0.2s; }
.tool:hover { border-color:var(--dim); }
.tool-header { padding:16px 20px; cursor:pointer; display:flex; align-items:flex-start; gap:12px; }
.tool-header:hover { background:rgba(255,255,255,0.02); }
.tool-name { font-size:16px; font-weight:600; color:var(--cyan); min-width:180px; }
.tool-meta { display:flex; gap:8px; align-items:center; flex-shrink:0; }
.tool-desc-preview { color:var(--dim); font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.param-badge { font-size:11px; padding:2px 8px; border-radius:10px; background:rgba(88,166,255,0.1); color:var(--link); white-space:nowrap; }
.req-badge { background:rgba(63,185,80,0.1); color:var(--green); }
.chevron { color:var(--dim); font-size:18px; transition:transform 0.2s; margin-left:auto; flex-shrink:0; }
.tool.open .chevron { transform:rotate(90deg); }

/* Tool body */
.tool-body { display:none; border-top:1px solid var(--border); }
.tool.open .tool-body { display:block; }

.tool-desc { padding:16px 20px; font-size:13px; color:var(--text); white-space:pre-wrap; line-height:1.7; max-height:300px; overflow-y:auto; background:rgba(0,0,0,0.15); }

/* Params table */
.params { padding:16px 20px; }
.params h4 { font-size:12px; color:var(--dim); text-transform:uppercase; margin-bottom:10px; letter-spacing:0.5px; }
.param-row { display:grid; grid-template-columns:160px 80px 1fr; gap:12px; padding:8px 0; border-bottom:1px solid rgba(48,54,61,0.5); align-items:start; font-size:13px; }
.param-row:last-child { border-bottom:none; }
.param-name { font-family:'SF Mono',monospace; font-weight:600; }
.param-name.required { color:var(--green); }
.param-name.optional { color:var(--dim); }
.param-type { font-family:'SF Mono',monospace; font-size:11px; padding:2px 6px; border-radius:4px; background:rgba(139,148,158,0.1); color:var(--dim); text-align:center; height:fit-content; }
.param-desc { color:var(--text); }
.param-enum { margin-top:4px; display:flex; flex-wrap:wrap; gap:4px; }
.enum-val { font-size:11px; padding:1px 6px; border-radius:4px; background:rgba(137,87,229,0.1); color:var(--purple); font-family:'SF Mono',monospace; }
.param-default { font-size:11px; color:var(--orange); margin-top:2px; }
.no-params { color:var(--dim); font-size:13px; font-style:italic; padding:8px 0; }

/* Schema JSON */
.schema-toggle { padding:8px 20px 16px; }
.schema-toggle button { font-size:11px; color:var(--link); background:none; border:none; cursor:pointer; }
.schema-toggle button:hover { text-decoration:underline; }
.schema-json { display:none; margin-top:8px; }
.schema-json pre { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; font-size:11px; overflow-x:auto; max-height:400px; overflow-y:auto; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Claude Code Tools Schema</h1>
    <div class="subtitle">Complete reference for all 54 tools available in Claude Code v2.1.92</div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="total-tools">0</div><div class="stat-label">Total Tools</div></div>
      <div class="stat"><div class="stat-num" id="builtin-tools">0</div><div class="stat-label">Built-in</div></div>
      <div class="stat"><div class="stat-num" id="mcp-tools">0</div><div class="stat-label">MCP</div></div>
      <div class="stat"><div class="stat-num" id="total-params">0</div><div class="stat-label">Total Params</div></div>
    </div>
  </div>

  <div class="search">
    <input type="text" id="search" placeholder="Search tools by name, description, or parameter...">
  </div>

  <div class="nav" id="nav"></div>
  <div id="content"></div>
</div>

<script>
const CATEGORY_ICONS = {
  'File Operations': '\u{1F4C1}',
  'Execution': '\u{1F4BB}',
  'Orchestration': '\u{1F3AF}',
  'Web': '\u{1F310}',
  'Task & Communication': '\u{1F4CB}',
  'Scheduling': '\u{23F0}',
  'MCP Resources': '\u{1F50C}',
  'MCP: Airtable': '\u{1F4CA}',
  'MCP: Gmail': '\u{2709}',
  'MCP: Google Calendar': '\u{1F4C5}',
  'Other': '\u{2699}',
};

const CATEGORY_ORDER = [
  'File Operations', 'Execution', 'Orchestration', 'Web',
  'Task & Communication', 'Scheduling', 'MCP Resources',
  'MCP: Airtable', 'MCP: Gmail', 'MCP: Google Calendar'
];

let TOOLS = [];
let activeCategory = 'all';

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function renderNav() {
  const nav = document.getElementById('nav');
  const cats = {};
  TOOLS.forEach(t => { cats[t.category] = (cats[t.category]||0)+1; });

  let html = `<div class="nav-btn active" data-cat="all">All<span class="count">${TOOLS.length}</span></div>`;
  for (const cat of CATEGORY_ORDER) {
    if (!cats[cat]) continue;
    html += `<div class="nav-btn" data-cat="${cat}">${CATEGORY_ICONS[cat]||''} ${cat}<span class="count">${cats[cat]}</span></div>`;
  }
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      nav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTools();
    });
  });
}

function renderTools() {
  const search = document.getElementById('search').value.toLowerCase();
  const content = document.getElementById('content');

  let filtered = TOOLS;
  if (activeCategory !== 'all') {
    filtered = filtered.filter(t => t.category === activeCategory);
  }
  if (search) {
    filtered = filtered.filter(t => {
      return t.name.toLowerCase().includes(search)
        || t.description.toLowerCase().includes(search)
        || t.params.some(p => p.name.toLowerCase().includes(search) || (p.description||'').toLowerCase().includes(search));
    });
  }

  // Group by category
  const groups = {};
  filtered.forEach(t => {
    if (!groups[t.category]) groups[t.category] = [];
    groups[t.category].push(t);
  });

  let html = '';
  for (const cat of CATEGORY_ORDER) {
    if (!groups[cat]) continue;
    const icon = CATEGORY_ICONS[cat] || '';
    html += `<div class="category">`;
    html += `<h2><span class="cat-icon">${icon}</span>${cat}<span class="cat-count">${groups[cat].length} tools</span></h2>`;

    for (const tool of groups[cat]) {
      const descPreview = (tool.description||'').split('\n')[0].substring(0, 100);
      const toolId = 'tool-' + tool.name.replace(/[^a-zA-Z0-9]/g, '_');
      const schemaId = 'schema-' + tool.name.replace(/[^a-zA-Z0-9]/g, '_');

      html += `<div class="tool" id="${toolId}">`;
      html += `<div class="tool-header" onclick="toggleTool('${toolId}')">`;
      html += `<span class="tool-name">${esc(tool.name)}</span>`;
      html += `<span class="tool-desc-preview">${esc(descPreview)}</span>`;
      html += `<div class="tool-meta">`;
      html += `<span class="param-badge">${tool.total_params} params</span>`;
      if (tool.required_count > 0) html += `<span class="param-badge req-badge">${tool.required_count} required</span>`;
      html += `</div>`;
      html += `<span class="chevron">\u{25B6}</span>`;
      html += `</div>`;

      // Body
      html += `<div class="tool-body">`;

      // Description
      if (tool.description) {
        html += `<div class="tool-desc">${esc(tool.description)}</div>`;
      }

      // Parameters
      html += `<div class="params">`;
      html += `<h4>Parameters</h4>`;
      if (tool.params.length === 0) {
        html += `<div class="no-params">No parameters required</div>`;
      } else {
        for (const p of tool.params) {
          const reqClass = p.required ? 'required' : 'optional';
          const reqLabel = p.required ? ' *' : '';
          html += `<div class="param-row">`;
          html += `<div class="param-name ${reqClass}">${esc(p.name)}${reqLabel}</div>`;
          html += `<div class="param-type">${esc(typeof p.type === 'string' ? p.type : JSON.stringify(p.type))}</div>`;
          html += `<div>`;
          if (p.description) html += `<div class="param-desc">${esc(p.description).substring(0, 200)}</div>`;
          if (p.enum) {
            html += `<div class="param-enum">`;
            p.enum.forEach(v => { html += `<span class="enum-val">${esc(String(v))}</span>`; });
            html += `</div>`;
          }
          if (p.default !== undefined && p.default !== null) {
            html += `<div class="param-default">default: ${esc(String(p.default))}</div>`;
          }
          html += `</div></div>`;
        }
      }
      html += `</div>`;

      // Schema JSON toggle
      html += `<div class="schema-toggle">`;
      html += `<button onclick="toggleSchema('${schemaId}')">Show raw JSON schema</button>`;
      html += `<div class="schema-json" id="${schemaId}"><pre>${esc(JSON.stringify({name: tool.name, params: tool.params}, null, 2))}</pre></div>`;
      html += `</div>`;

      html += `</div></div>`;
    }
    html += `</div>`;
  }

  if (!html) {
    html = '<p style="text-align:center;color:var(--dim);padding:40px">No tools match your search.</p>';
  }

  content.innerHTML = html;
}

function toggleTool(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function toggleSchema(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// Load data
TOOLS = INLINE_DATA; {
  document.getElementById('total-tools').textContent = TOOLS.length;
  document.getElementById('builtin-tools').textContent = TOOLS.filter(t=>!t.category.startsWith('MCP:')).length;
  document.getElementById('mcp-tools').textContent = TOOLS.filter(t=>t.category.startsWith('MCP:')).length;
  document.getElementById('total-params').textContent = TOOLS.reduce((s,t)=>s+t.total_params, 0);
  renderNav();
  renderTools();
});

document.getElementById('search').addEventListener('input', renderTools);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});
</script>

<script>
// Inline tool data so it works without a server
const INLINE_DATA = [{"name": "Agent", "description": "Launch a new agent to handle complex, multi-step tasks autonomously.\n\nThe Agent tool launches specialized agents (subprocesses) that autonomously handle complex tasks. Each agent type has specific capabilities and tools available to it.\n\nAvailable agent types and the tools they have access to:\n- general-purpose: General-purpose agent for researching complex questions, searching for code, and executing multi-step tasks. When you are searching for a keyword or file and are not confident that you will find the right match in the first few tries use this agent to perform the search for you. (Tools: *)\n- statusline-setup: Use this agent to configure the user's Claude Code status line setting. (Tools: Read, Edit)\n- Explore: Fast agent specialized for exploring codebases. Use this when you need to quickly find files by patterns (eg. \"src/components/**/*.tsx\"), search code for keywords (eg. \"API endpoints\"), or answer questions about the codebase (eg. \"how do API endpoints work?\"). When calling this agent, specify the desired thoroughness level: \"quick\" for basic searches, \"medium\" for moderate exploration, or \"very thorough\" for comprehensive analysis across multiple locations and naming conventions. (Tools: All tools except Agent, ExitPlanMode, Edit, Write, NotebookEdit)\n- Plan: Software architect agent for designing implementation plans. Use this when you need to plan the implementation strategy for a task. Returns step-by-step plans, identifies critical files, and considers architectural trade-offs. (Tools: All tools except Agent, ExitPlanMode, Edit, Write, NotebookEdit)\n- claude-code-guide: Use this agent when the user asks questions (\"Can Claude...\", \"Does Claude...\", \"How do I...\") about: (1) Claude Code (the CLI tool) - features, hooks, slash commands, MCP servers, settings, IDE integrations, keyboard shortcuts; (2) Claude Agent SDK - building custom agents; (3) Claude API (formerly Anthropic API) - API usage, tool use, Anthropic SDK usage. **IMPORTANT:** Before spawning a new agent, check if there is already a running or recently completed claude-code-guide agent that you can continue via SendMessage. (Tools: Glob, Grep, Read, WebFetch, WebSearch)\n\nWhen using the Agent tool, specify a subagent_type parameter to select which agent type to use. If omitted, the general-purpose agent is used.\n\nWhen NOT to use the Agent tool:\n- If you want to read a specific file path, use the Read tool or the Glob tool instead of the Agent tool, to find the match more quickly\n- If you are searching for a specific class definition like \"class Foo\", use the Glob tool instead, to find the match more quickly\n- If you are searching for code within a specific file or set of 2-3 files, use the Read tool instead of the Agent tool, to find the match more quickly\n- Other tasks that are not related to the agent descriptions above\n\n\nUsage notes:\n- Always include a short description (3-5 words) summarizing what the agent will do\n- Launch multiple agents concurrently whenever possible, to maximize performance; to do that, use a single message with multiple tool uses\n- When the agent is done, it will return a single message back to you. The result returned by the agent is not visible to the user. To show the user the result, you should send a text message back to the user with a concise summary of the result.\n- You can optionally run agents in the background using the run_in_background parameter. When an agent runs in the background, you will be automatically notified when it completes — do NOT sleep, poll, or proactively check on its progress. Continue with other work or respond to the user instead.\n- **Foreground vs background**: Use foreground (default) when you need the agent's results before you can proceed — e.g., research agents whose findings inform your next steps. Use background when you have genuinely independent work to do in parallel.\n- To continue a previously spawned agent, use SendMessage with the agent's ID or name as the `to` field. The agent resumes with its full context preserved. Each Agent invocation starts fresh — provide a complete task description.\n- The agent's outputs should generally be trusted\n- Clearly tell the agent whether you expect it to write code or just to do research (search, file reads, web fetches, etc.), since it is not aware of the user's intent\n- If the agent description mentions that it should be used proactively, then you should try your best to use it without the user having to ask for it first. Use your judgement.\n- If the user specifies that they want you to run agents \"in parallel\", you MUST send a single message with multiple Agent tool use content blocks. For example, if you need to launch both a build-validator agent and a test-runner agent in parallel, send a single message with both tool calls.\n- You can optionally set `isolation: \"worktree\"` to run the agent in a temporary git worktree, giving it an isolated copy of the repository. The worktree is automatically cleaned up if the agent makes no changes; if changes are made, the worktree path and branch are returned in the result.\n\n## Writing the prompt\n\nBrief the agent like a smart colleague who just walked into the room — it hasn't seen this conversation, doesn't know what you've tried, doesn't understand why this task matters.\n- Explain what you're trying to accomplish and why.\n- Describe what you've already learned or ruled out.\n- Give enough context about the surrounding problem that the agent can make judgment calls rather than just following a narrow instruction.\n- If you need a short response, say so (\"report in under 200 words\").\n- Lookups: hand over the exact command. Investigations: hand over the question — prescribed steps become dead weight when the premise is wrong.\n\nTerse command-style prompts produce shallow, generic work.\n\n**Never delegate understanding.** Don't write \"based on your findings, fix the bug\" or \"based on the research, implement it.\" Those phrases push synthesis onto the agent instead of doing it yourself. Write prompts that prove you understood: include file paths, line numbers, what specifically to change.\n\n\nExample usage:\n\n<example_agent_descriptions>\n\"test-runner\": use this agent after you are done writing code to run tests\n\"greeting-responder\": use this agent to respond to user greetings with a friendly joke\n</example_agent_descriptions>\n\n<example>\nuser: \"Please write a function that checks if a number is prime\"\nassistant: I'm going to use the Write tool to write the following code:\n<code>\nfunction isPrime(n) {\n  if (n <= 1) return false\n  for (let i = 2; i * i <= n; i++) {\n    if (n % i === 0) return false\n  }\n  return true\n}\n</code>\n<commentary>\nSince a significant piece of code was written and the task was completed, now use the test-runner agent to run the tests\n</commentary>\nassistant: Uses the Agent tool to launch the test-runner agent\n</example>\n\n<example>\nuser: \"Hello\"\n<commentary>\nSince the user is greeting, use the greeting-responder agent to respond with a friendly joke\n</commentary>\nassistant: \"I'm going to use the Agent tool to launch the greeting-responder agent\"\n</example>\n", "category": "Orchestration", "params": [{"name": "description", "type": "string", "description": "A short (3-5 word) description of the task", "required": true, "enum": null, "default": null}, {"name": "prompt", "type": "string", "description": "The task for the agent to perform", "required": true, "enum": null, "default": null}, {"name": "subagent_type", "type": "string", "description": "The type of specialized agent to use for this task", "required": false, "enum": null, "default": null}, {"name": "model", "type": "string", "description": "Optional model override for this agent. Takes precedence over the agent definition's model frontmatter. If omitted, uses the agent definition's model, or inherits from the parent.", "required": false, "enum": ["sonnet", "opus", "haiku"], "default": null}, {"name": "run_in_background", "type": "boolean", "description": "Set to true to run this agent in the background. You will be notified when it completes.", "required": false, "enum": null, "default": null}, {"name": "isolation", "type": "string", "description": "Isolation mode. \"worktree\" creates a temporary git worktree so the agent works on an isolated copy of the repo.", "required": false, "enum": ["worktree"], "default": null}], "required_count": 2, "total_params": 6}, {"name": "AskUserQuestion", "description": "Use this tool when you need to ask the user questions during execution. This allows you to:\n1. Gather user preferences or requirements\n2. Clarify ambiguous instructions\n3. Get decisions on implementation choices as you work\n4. Offer choices to the user about what direction to take.\n\nUsage notes:\n- Users will always be able to select \"Other\" to provide custom text input\n- Use multiSelect: true to allow multiple answers to be selected for a question\n- If you recommend a specific option, make that the first option in the list and add \"(Recommended)\" at the end of the label\n\nPlan mode note: In plan mode, use this tool to clarify requirements or choose between approaches BEFORE finalizing your plan. Do NOT use this tool to ask \"Is my plan ready?\" or \"Should I proceed?\" - use ExitPlanMode for plan approval. IMPORTANT: Do not reference \"the plan\" in your questions (e.g., \"Do you have feedback about the plan?\", \"Does the plan look good?\") because the user cannot see the plan in the UI until you call ExitPlanMode. If you need plan approval, use ExitPlanMode instead.\n\nPreview feature:\nUse the optional `preview` field on options when presenting concrete artifacts that users need to visually compare:\n- ASCII mockups of UI layouts or components\n- Code snippets showing different implementations\n- Diagram variations\n- Configuration examples\n\nPreview content is rendered as markdown in a monospace box. Multi-line text with newlines is supported. When any option has a preview, the UI switches to a side-by-side layout with a vertical option list on the left and preview on the right. Do not use previews for simple preference questions where labels and descriptions suffice. Note: previews are only supported for single-select questions (not multiSelect).\n", "category": "Task & Communication", "params": [{"name": "questions", "type": "array", "description": "Questions to ask the user (1-4 questions)", "required": true, "enum": null, "default": null}, {"name": "answers", "type": "object", "description": "User answers collected by the permission component", "required": false, "enum": null, "default": null}, {"name": "annotations", "type": "object", "description": "Optional per-question annotations from the user (e.g., notes on preview selections). Keyed by question text.", "required": false, "enum": null, "default": null}, {"name": "metadata", "type": "object", "description": "Optional metadata for tracking and analytics purposes. Not displayed to user.", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 4}, {"name": "Bash", "description": "Executes a given bash command and returns its output.\n\nThe working directory persists between commands, but shell state does not. The shell environment is initialized from the user's profile (bash or zsh).\n\nIMPORTANT: Avoid using this tool to run `find`, `grep`, `cat`, `head`, `tail`, `sed`, `awk`, or `echo` commands, unless explicitly instructed or after you have verified that a dedicated tool cannot accomplish your task. Instead, use the appropriate dedicated tool as this will provide a much better experience for the user:\n\n - File search: Use Glob (NOT find or ls)\n - Content search: Use Grep (NOT grep or rg)\n - Read files: Use Read (NOT cat/head/tail)\n - Edit files: Use Edit (NOT sed/awk)\n - Write files: Use Write (NOT echo >/cat <<EOF)\n - Communication: Output text directly (NOT echo/printf)\nWhile the Bash tool can do similar things, it’s better to use the built-in tools as they provide a better user experience and make it easier to review tool calls and give permission.\n\n# Instructions\n - To rerun a prior command exactly, emit {rerun:'bN'} from the result footer instead of retyping the command.\n - If your command will create new directories or files, first use this tool to run `ls` to verify the parent directory exists and is the correct location.\n - Always quote file paths that contain spaces with double quotes in your command (e.g., cd \"path with spaces/file.txt\")\n - Try to maintain your current working directory throughout the session by using absolute paths and avoiding usage of `cd`. You may use `cd` if the User explicitly requests it.\n - You may specify an optional timeout in milliseconds (up to 600000ms / 10 minutes). By default, your command will timeout after 120000ms (2 minutes).\n - You can use the `run_in_background` parameter to run the command in the background. Only use this if you don't need the result immediately and are OK being notified when the command completes later. You do not need to check the output right away - you'll be notified when it finishes. You do not need to use '&' at the end of the command when using this parameter.\n - When issuing multiple commands:\n  - If the commands are independent and can run in parallel, make multiple Bash tool calls in a single message. Example: if you need to run \"git status\" and \"git diff\", send a single message with two Bash tool calls in parallel.\n  - If the commands depend on each other and must run sequentially, use a single Bash call with '&&' to chain them together.\n  - Use ';' only when you need to run commands sequentially but don't care if earlier commands fail.\n  - DO NOT use newlines to separate commands (newlines are ok in quoted strings).\n - For git commands:\n  - Prefer to create a new commit rather than amending an existing commit.\n  - Before running destructive operations (e.g., git reset --hard, git push --force, git checkout --), consider whether there is a safer alternative that achieves the same goal. Only use destructive operations when they are truly the best approach.\n  - Never skip hooks (--no-verify) or bypass signing (--no-gpg-sign, -c commit.gpgsign=false) unless the user has explicitly asked for it. If a hook fails, investigate and fix the underlying issue.\n - Avoid unnecessary `sleep` commands:\n  - Do not sleep between commands that can run immediately — just run them.\n  - If your command is long running and you would like to be notified when it finishes — use `run_in_background`. No sleep needed.\n  - Do not retry failing commands in a sleep loop — diagnose the root cause.\n  - If waiting for a background task you started with `run_in_background`, you will be notified when it completes — do not poll.\n  - If you must poll an external process, use a check command (e.g. `gh run view`) rather than sleeping first.\n  - If you must sleep, keep the duration short (1-5 seconds) to avoid blocking the user.\n\n\n# Committing changes with git\n\nOnly create commits when requested by the user. If unclear, ask first. When the user asks you to create a new git commit, follow these steps carefully:\n\nYou can call multiple tools in a single response. When multiple independent pieces of information are requested and all commands are likely to succeed, run multiple tool calls in parallel for optimal performance. The numbered steps below indicate which commands should be batched in parallel.\n\nGit Safety Protocol:\n- NEVER update the git config\n- NEVER run destructive git commands (push --force, reset --hard, checkout ., restore ., clean -f, branch -D) unless the user explicitly requests these actions. Taking unauthorized destructive actions is unhelpful and can result in lost work, so it's best to ONLY run these commands when given direct instructions \n- NEVER skip hooks (--no-verify, --no-gpg-sign, etc) unless the user explicitly requests it\n- NEVER run force push to main/master, warn the user if they request it\n- CRITICAL: Always create NEW commits rather than amending, unless the user explicitly requests a git amend. When a pre-commit hook fails, the commit did NOT happen — so --amend would modify the PREVIOUS commit, which may result in destroying work or losing previous changes. Instead, after hook failure, fix the issue, re-stage, and create a NEW commit\n- When staging files, prefer adding specific files by name rather than using \"git add -A\" or \"git add .\", which can accidentally include sensitive files (.env, credentials) or large binaries\n- NEVER commit changes unless the user explicitly asks you to. It is VERY IMPORTANT to only commit when explicitly asked, otherwise the user will feel that you are being too proactive\n\n1. Run the following bash commands in parallel, each using the Bash tool:\n  - Run a git status command to see all untracked files. IMPORTANT: Never use the -uall flag as it can cause memory issues on large repos.\n  - Run a git diff command to see both staged and unstaged changes that will be committed.\n  - Run a git log command to see recent commit messages, so that you can follow this repository's commit message style.\n2. Analyze all staged changes (both previously staged and newly added) and draft a commit message:\n  - Summarize the nature of the changes (eg. new feature, enhancement to an existing feature, bug fix, refactoring, test, docs, etc.). Ensure the message accurately reflects the changes and their purpose (i.e. \"add\" means a wholly new feature, \"update\" means an enhancement to an existing feature, \"fix\" means a bug fix, etc.).\n  - Do not commit files that likely contain secrets (.env, credentials.json, etc). Warn the user if they specifically request to commit those files\n  - Draft a concise (1-2 sentences) commit message that focuses on the \"why\" rather than the \"what\"\n  - Ensure it accurately reflects the changes and their purpose\n3. Run the following commands in parallel:\n   - Add relevant untracked files to the staging area.\n   - Create the commit with a message ending with:\n   Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>\n   - Run git status after the commit completes to verify success.\n   Note: git status depends on the commit completing, so run it sequentially after the commit.\n4. If the commit fails due to pre-commit hook: fix the issue and create a NEW commit\n\nImportant notes:\n- NEVER run additional commands to read or explore code, besides git bash commands\n- NEVER use the TodoWrite or Agent tools\n- DO NOT push to the remote repository unless the user explicitly asks you to do so\n- IMPORTANT: Never use git commands with the -i flag (like git rebase -i or git add -i) since they require interactive input which is not supported.\n- IMPORTANT: Do not use --no-edit with git rebase commands, as the --no-edit flag is not a valid option for git rebase.\n- If there are no changes to commit (i.e., no untracked files and no modifications), do not create an empty commit\n- In order to ensure good formatting, ALWAYS pass the commit message via a HEREDOC, a la this example:\n<example>\ngit commit -m \"$(cat <<'EOF'\n   Commit message here.\n\n   Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>\n   EOF\n   )\"\n</example>\n\n# Creating pull requests\nUse the gh command via the Bash tool for ALL GitHub-related tasks including working with issues, pull requests, checks, and releases. If given a Github URL use the gh command to get the information needed.\n\nIMPORTANT: When the user asks you to create a pull request, follow these steps carefully:\n\n1. Run the following bash commands in parallel using the Bash tool, in order to understand the current state of the branch since it diverged from the main branch:\n   - Run a git status command to see all untracked files (never use -uall flag)\n   - Run a git diff command to see both staged and unstaged changes that will be committed\n   - Check if the current branch tracks a remote branch and is up to date with the remote, so you know if you need to push to the remote\n   - Run a git log command and `git diff [base-branch]...HEAD` to understand the full commit history for the current branch (from the time it diverged from the base branch)\n2. Analyze all changes that will be included in the pull request, making sure to look at all relevant commits (NOT just the latest commit, but ALL commits that will be included in the pull request!!!), and draft a pull request title and summary:\n   - Keep the PR title short (under 70 characters)\n   - Use the description/body for details, not the title\n3. Run the following commands in parallel:\n   - Create new branch if needed\n   - Push to remote with -u flag if needed\n   - Create PR using gh pr create with the format below. Use a HEREDOC to pass the body to ensure correct formatting.\n<example>\ngh pr create --title \"the pr title\" --body \"$(cat <<'EOF'\n## Summary\n<1-3 bullet points>\n\n## Test plan\n[Bulleted markdown checklist of TODOs for testing the pull request...]\n\n🤖 Generated with [Claude Code](https://claude.com/claude-code)\nEOF\n)\"\n</example>\n\nImportant:\n- DO NOT use the TodoWrite or Agent tools\n- Return the PR URL when you're done, so the user can see it\n\n# Other common operations\n- View comments on a Github PR: gh api repos/foo/bar/pulls/123/comments", "category": "Execution", "params": [{"name": "command", "type": "string", "description": "The command to execute", "required": true, "enum": null, "default": null}, {"name": "timeout", "type": "number", "description": "Optional timeout in milliseconds (max 600000)", "required": false, "enum": null, "default": null}, {"name": "description", "type": "string", "description": "Clear, concise description of what this command does in active voice. Never use words like \"complex\" or \"risk\" in the description - just describe what it does.\n\nFor simple commands (git, npm, standard CLI tools), keep it brief (5-10 words):\n- ls → \"List files in current directory\"\n- git status → \"Show working tree status\"\n- npm install → \"Install package dependencies\"\n\nFor commands that are harder to parse at a glance (piped commands, obscure flags, etc.), add enough context to clarify what it does:\n- find . -name \"*.tmp\" -exec rm {} \\; → \"Find and delete all .tmp files recursively\"\n- git reset --hard origin/main → \"Discard all local changes and match remote main\"\n- curl -s url | jq '.data[]' → \"Fetch JSON from URL and extract data array elements\"", "required": false, "enum": null, "default": null}, {"name": "run_in_background", "type": "boolean", "description": "Set to true to run this command in the background. Use Read to read the output later.", "required": false, "enum": null, "default": null}, {"name": "dangerouslyDisableSandbox", "type": "boolean", "description": "Set this to true to dangerously override sandbox mode and run commands without sandboxing.", "required": false, "enum": null, "default": null}, {"name": "rerun", "type": "string", "description": "Rerun a prior command exactly by passing the alias from a previous result's [rerun: bN] footer (e.g. 'b3'). Mutually exclusive with 'command'.", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 6}, {"name": "CronCreate", "description": "Schedule a prompt to be enqueued at a future time. Use for both recurring schedules and one-shot reminders.\n\nUses standard 5-field cron in the user's local timezone: minute hour day-of-month month day-of-week. \"0 9 * * *\" means 9am local — no timezone conversion needed.\n\n## One-shot tasks (recurring: false)\n\nFor \"remind me at X\" or \"at <time>, do Y\" requests — fire once then auto-delete.\nPin minute/hour/day-of-month/month to specific values:\n  \"remind me at 2:30pm today to check the deploy\" → cron: \"30 14 <today_dom> <today_month> *\", recurring: false\n  \"tomorrow morning, run the smoke test\" → cron: \"57 8 <tomorrow_dom> <tomorrow_month> *\", recurring: false\n\n## Recurring jobs (recurring: true, the default)\n\nFor \"every N minutes\" / \"every hour\" / \"weekdays at 9am\" requests:\n  \"*/5 * * * *\" (every 5 min), \"0 * * * *\" (hourly), \"0 9 * * 1-5\" (weekdays at 9am local)\n\n## Avoid the :00 and :30 minute marks when the task allows it\n\nEvery user who asks for \"9am\" gets `0 9`, and every user who asks for \"hourly\" gets `0 *` — which means requests from across the planet land on the API at the same instant. When the user's request is approximate, pick a minute that is NOT 0 or 30:\n  \"every morning around 9\" → \"57 8 * * *\" or \"3 9 * * *\" (not \"0 9 * * *\")\n  \"hourly\" → \"7 * * * *\" (not \"0 * * * *\")\n  \"in an hour or so, remind me to...\" → pick whatever minute you land on, don't round\n\nOnly use minute 0 or 30 when the user names that exact time and clearly means it (\"at 9:00 sharp\", \"at half past\", coordinating with a meeting). When in doubt, nudge a few minutes early or late — the user will not notice, and the fleet will.\n\n## Session-only\n\nJobs live only in this Claude session — nothing is written to disk, and the job is gone when Claude exits.\n\n## Runtime behavior\n\nJobs only fire while the REPL is idle (not mid-query). The scheduler adds a small deterministic jitter on top of whatever you pick: recurring tasks fire up to 10% of their period late (max 15 min); one-shot tasks landing on :00 or :30 fire up to 90 s early. Picking an off-minute is still the bigger lever.\n\nRecurring tasks auto-expire after 7 days — they fire one final time, then are deleted. This bounds session lifetime. Tell the user about the 7-day limit when scheduling recurring jobs.\n\nReturns a job ID you can pass to CronDelete.", "category": "Scheduling", "params": [{"name": "cron", "type": "string", "description": "Standard 5-field cron expression in local time: \"M H DoM Mon DoW\" (e.g. \"*/5 * * * *\" = every 5 minutes, \"30 14 28 2 *\" = Feb 28 at 2:30pm local once).", "required": true, "enum": null, "default": null}, {"name": "prompt", "type": "string", "description": "The prompt to enqueue at each fire time.", "required": true, "enum": null, "default": null}, {"name": "recurring", "type": "boolean", "description": "true (default) = fire on every cron match until deleted or auto-expired after 7 days. false = fire once at the next match, then auto-delete. Use false for \"remind me at X\" one-shot requests with pinned minute/hour/dom/month.", "required": false, "enum": null, "default": null}, {"name": "durable", "type": "boolean", "description": "true = persist to .claude/scheduled_tasks.json and survive restarts. false (default) = in-memory only, dies when this Claude session ends. Use true only when the user asks the task to survive across sessions.", "required": false, "enum": null, "default": null}], "required_count": 2, "total_params": 4}, {"name": "CronDelete", "description": "Cancel a cron job previously scheduled with CronCreate. Removes it from the in-memory session store.", "category": "Scheduling", "params": [{"name": "id", "type": "string", "description": "Job ID returned by CronCreate.", "required": true, "enum": null, "default": null}], "required_count": 1, "total_params": 1}, {"name": "CronList", "description": "List all cron jobs scheduled via CronCreate in this session.", "category": "Scheduling", "params": [], "required_count": 0, "total_params": 0}, {"name": "Edit", "description": "Performs exact string replacements in files.\n\nUsage:\n- You must use your `Read` tool at least once in the conversation before editing. This tool will error if you attempt an edit without reading the file.\n- When editing text from Read tool output, ensure you preserve the exact indentation (tabs/spaces) as it appears AFTER the line number prefix. The line number prefix format is: line number + tab. Everything after that is the actual file content to match. Never include any part of the line number prefix in the old_string or new_string.\n- ALWAYS prefer editing existing files in the codebase. NEVER write new files unless explicitly required.\n- Only use emojis if the user explicitly requests it. Avoid adding emojis to files unless asked.\n- The edit will FAIL if `old_string` is not unique in the file. Either provide a larger string with more surrounding context to make it unique or use `replace_all` to change every instance of `old_string`.\n- Use `replace_all` for replacing and renaming strings across the file. This parameter is useful if you want to rename a variable for instance.", "category": "File Operations", "params": [{"name": "file_path", "type": "string", "description": "The absolute path to the file to modify", "required": true, "enum": null, "default": null}, {"name": "old_string", "type": "string", "description": "The text to replace", "required": true, "enum": null, "default": null}, {"name": "new_string", "type": "string", "description": "The text to replace it with (must be different from old_string)", "required": true, "enum": null, "default": null}, {"name": "replace_all", "type": "boolean", "description": "Replace all occurrences of old_string (default false)", "required": false, "enum": null, "default": false}], "required_count": 3, "total_params": 4}, {"name": "EnterPlanMode", "description": "Use this tool proactively when you're about to start a non-trivial implementation task. Getting user sign-off on your approach before writing code prevents wasted effort and ensures alignment. This tool transitions you into plan mode where you can explore the codebase and design an implementation approach for user approval.\n\n## When to Use This Tool\n\n**Prefer using EnterPlanMode** for implementation tasks unless they're simple. Use it when ANY of these conditions apply:\n\n1. **New Feature Implementation**: Adding meaningful new functionality\n   - Example: \"Add a logout button\" - where should it go? What should happen on click?\n   - Example: \"Add form validation\" - what rules? What error messages?\n\n2. **Multiple Valid Approaches**: The task can be solved in several different ways\n   - Example: \"Add caching to the API\" - could use Redis, in-memory, file-based, etc.\n   - Example: \"Improve performance\" - many optimization strategies possible\n\n3. **Code Modifications**: Changes that affect existing behavior or structure\n   - Example: \"Update the login flow\" - what exactly should change?\n   - Example: \"Refactor this component\" - what's the target architecture?\n\n4. **Architectural Decisions**: The task requires choosing between patterns or technologies\n   - Example: \"Add real-time updates\" - WebSockets vs SSE vs polling\n   - Example: \"Implement state management\" - Redux vs Context vs custom solution\n\n5. **Multi-File Changes**: The task will likely touch more than 2-3 files\n   - Example: \"Refactor the authentication system\"\n   - Example: \"Add a new API endpoint with tests\"\n\n6. **Unclear Requirements**: You need to explore before understanding the full scope\n   - Example: \"Make the app faster\" - need to profile and identify bottlenecks\n   - Example: \"Fix the bug in checkout\" - need to investigate root cause\n\n7. **User Preferences Matter**: The implementation could reasonably go multiple ways\n   - If you would use AskUserQuestion to clarify the approach, use EnterPlanMode instead\n   - Plan mode lets you explore first, then present options with context\n\n## When NOT to Use This Tool\n\nOnly skip EnterPlanMode for simple tasks:\n- Single-line or few-line fixes (typos, obvious bugs, small tweaks)\n- Adding a single function with clear requirements\n- Tasks where the user has given very specific, detailed instructions\n- Pure research/exploration tasks (use the Agent tool with explore agent instead)\n\n## What Happens in Plan Mode\n\nIn plan mode, you'll:\n1. Thoroughly explore the codebase using Glob, Grep, and Read tools\n2. Understand existing patterns and architecture\n3. Design an implementation approach\n4. Present your plan to the user for approval\n5. Use AskUserQuestion if you need to clarify approaches\n6. Exit plan mode with ExitPlanMode when ready to implement\n\n## Examples\n\n### GOOD - Use EnterPlanMode:\nUser: \"Add user authentication to the app\"\n- Requires architectural decisions (session vs JWT, where to store tokens, middleware structure)\n\nUser: \"Optimize the database queries\"\n- Multiple approaches possible, need to profile first, significant impact\n\nUser: \"Implement dark mode\"\n- Architectural decision on theme system, affects many components\n\nUser: \"Add a delete button to the user profile\"\n- Seems simple but involves: where to place it, confirmation dialog, API call, error handling, state updates\n\nUser: \"Update the error handling in the API\"\n- Affects multiple files, user should approve the approach\n\n### BAD - Don't use EnterPlanMode:\nUser: \"Fix the typo in the README\"\n- Straightforward, no planning needed\n\nUser: \"Add a console.log to debug this function\"\n- Simple, obvious implementation\n\nUser: \"What files handle routing?\"\n- Research task, not implementation planning\n\n## Important Notes\n\n- This tool REQUIRES user approval - they must consent to entering plan mode\n- If unsure whether to use it, err on the side of planning - it's better to get alignment upfront than to redo work\n- Users appreciate being consulted before significant changes are made to their codebase\n", "category": "Orchestration", "params": [], "required_count": 0, "total_params": 0}, {"name": "EnterWorktree", "description": "Use this tool ONLY when the user explicitly asks to work in a worktree. This tool creates an isolated git worktree and switches the current session into it.\n\n## When to Use\n\n- The user explicitly says \"worktree\" (e.g., \"start a worktree\", \"work in a worktree\", \"create a worktree\", \"use a worktree\")\n\n## When NOT to Use\n\n- The user asks to create a branch, switch branches, or work on a different branch — use git commands instead\n- The user asks to fix a bug or work on a feature — use normal git workflow unless they specifically mention worktrees\n- Never use this tool unless the user explicitly mentions \"worktree\"\n\n## Requirements\n\n- Must be in a git repository, OR have WorktreeCreate/WorktreeRemove hooks configured in settings.json\n- Must not already be in a worktree\n\n## Behavior\n\n- In a git repository: creates a new git worktree inside `.claude/worktrees/` with a new branch based on HEAD\n- Outside a git repository: delegates to WorktreeCreate/WorktreeRemove hooks for VCS-agnostic isolation\n- Switches the session's working directory to the new worktree\n- Use ExitWorktree to leave the worktree mid-session (keep or remove). On session exit, if still in the worktree, the user will be prompted to keep or remove it\n\n## Parameters\n\n- `name` (optional): A name for the worktree. If not provided, a random name is generated.\n", "category": "Orchestration", "params": [{"name": "name", "type": "string", "description": "Optional name for the worktree. Each \"/\"-separated segment may contain only letters, digits, dots, underscores, and dashes; max 64 chars total. A random name is generated if not provided.", "required": false, "enum": null, "default": null}], "required_count": 0, "total_params": 1}, {"name": "ExitPlanMode", "description": "Use this tool when you are in plan mode and have finished writing your plan to the plan file and are ready for user approval.\n\n## How This Tool Works\n- You should have already written your plan to the plan file specified in the plan mode system message\n- This tool does NOT take the plan content as a parameter - it will read the plan from the file you wrote\n- This tool simply signals that you're done planning and ready for the user to review and approve\n- The user will see the contents of your plan file when they review it\n\n## When to Use This Tool\nIMPORTANT: Only use this tool when the task requires planning the implementation steps of a task that requires writing code. For research tasks where you're gathering information, searching files, reading files or in general trying to understand the codebase - do NOT use this tool.\n\n## Before Using This Tool\nEnsure your plan is complete and unambiguous:\n- If you have unresolved questions about requirements or approach, use AskUserQuestion first (in earlier phases)\n- Once your plan is finalized, use THIS tool to request approval\n\n**Important:** Do NOT use AskUserQuestion to ask \"Is this plan okay?\" or \"Should I proceed?\" - that's exactly what THIS tool does. ExitPlanMode inherently requests user approval of your plan.\n\n## Examples\n\n1. Initial task: \"Search for and understand the implementation of vim mode in the codebase\" - Do not use the exit plan mode tool because you are not planning the implementation steps of a task.\n2. Initial task: \"Help me implement yank mode for vim\" - Use the exit plan mode tool after you have finished planning the implementation steps of the task.\n3. Initial task: \"Add a new feature to handle user authentication\" - If unsure about auth method (OAuth, JWT, etc.), use AskUserQuestion first, then use exit plan mode tool after clarifying the approach.\n", "category": "Orchestration", "params": [{"name": "allowedPrompts", "type": "array", "description": "Prompt-based permissions needed to implement the plan. These describe categories of actions rather than specific commands.", "required": false, "enum": null, "default": null}], "required_count": 0, "total_params": 1}, {"name": "ExitWorktree", "description": "Exit a worktree session created by EnterWorktree and return the session to the original working directory.\n\n## Scope\n\nThis tool ONLY operates on worktrees created by EnterWorktree in this session. It will NOT touch:\n- Worktrees you created manually with `git worktree add`\n- Worktrees from a previous session (even if created by EnterWorktree then)\n- The directory you're in if EnterWorktree was never called\n\nIf called outside an EnterWorktree session, the tool is a **no-op**: it reports that no worktree session is active and takes no action. Filesystem state is unchanged.\n\n## When to Use\n\n- The user explicitly asks to \"exit the worktree\", \"leave the worktree\", \"go back\", or otherwise end the worktree session\n- Do NOT call this proactively — only when the user asks\n\n## Parameters\n\n- `action` (required): `\"keep\"` or `\"remove\"`\n  - `\"keep\"` — leave the worktree directory and branch intact on disk. Use this if the user wants to come back to the work later, or if there are changes to preserve.\n  - `\"remove\"` — delete the worktree directory and its branch. Use this for a clean exit when the work is done or abandoned.\n- `discard_changes` (optional, default false): only meaningful with `action: \"remove\"`. If the worktree has uncommitted files or commits not on the original branch, the tool will REFUSE to remove it unless this is set to `true`. If the tool returns an error listing changes, confirm with the user before re-invoking with `discard_changes: true`.\n\n## Behavior\n\n- Restores the session's working directory to where it was before EnterWorktree\n- Clears CWD-dependent caches (system prompt sections, memory files, plans directory) so the session state reflects the original directory\n- If a tmux session was attached to the worktree: killed on `remove`, left running on `keep` (its name is returned so the user can reattach)\n- Once exited, EnterWorktree can be called again to create a fresh worktree\n", "category": "Orchestration", "params": [{"name": "action", "type": "string", "description": "\"keep\" leaves the worktree and branch on disk; \"remove\" deletes both.", "required": true, "enum": ["keep", "remove"], "default": null}, {"name": "discard_changes", "type": "boolean", "description": "Required true when action is \"remove\" and the worktree has uncommitted files or unmerged commits. The tool will refuse and list them otherwise.", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 2}, {"name": "Glob", "description": "- Fast file pattern matching tool that works with any codebase size\n- Supports glob patterns like \"**/*.js\" or \"src/**/*.ts\"\n- Returns matching file paths sorted by modification time\n- Use this tool when you need to find files by name patterns\n- When you are doing an open ended search that may require multiple rounds of globbing and grepping, use the Agent tool instead", "category": "File Operations", "params": [{"name": "pattern", "type": "string", "description": "The glob pattern to match files against", "required": true, "enum": null, "default": null}, {"name": "path", "type": "string", "description": "The directory to search in. If not specified, the current working directory will be used. IMPORTANT: Omit this field to use the default directory. DO NOT enter \"undefined\" or \"null\" - simply omit it for the default behavior. Must be a valid directory path if provided.", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 2}, {"name": "Grep", "description": "A powerful search tool built on ripgrep\n\n  Usage:\n  - ALWAYS use Grep for search tasks. NEVER invoke `grep` or `rg` as a Bash command. The Grep tool has been optimized for correct permissions and access.\n  - Supports full regex syntax (e.g., \"log.*Error\", \"function\\s+\\w+\")\n  - Filter files with glob parameter (e.g., \"*.js\", \"**/*.tsx\") or type parameter (e.g., \"js\", \"py\", \"rust\")\n  - Output modes: \"content\" shows matching lines, \"files_with_matches\" shows only file paths (default), \"count\" shows match counts\n  - Use Agent tool for open-ended searches requiring multiple rounds\n  - Pattern syntax: Uses : null}, {"name": "-n", "type": "boolean", "description": "Show line numbers in output (rg -n). Requires output_mode: \"content\", ignored otherwise. Defaults to true.", "required": false, "enum": null, "default": null}, {"name": "-i", "type": "boolean", "description": "Case insensitive search (rg -i)", "required": false, "enum": null, "default": null}, {"name": "type", "type": "string", "description": "File type to search (rg --type). Common types: js, py, rust, go, java, etc. More efficient than include for standard file types.", "required": false, "enum": null, "default": null}, {"name": "head_limit", "type": "number", "description": "Limit output to first N lines/entries, equivalent to \"| head -N\". Works across all output modes: content (limits output lines), files_with_matches (limits file paths), count (limits count entries). Defaults to 250 when unspecified. Pass 0 for unlimited (use sparingly — large result sets waste context).", "required": false, "enum": null, "default": null}, {"name": "offset", "type": "number", "description": "Skip first N lines/entries before applying head_limit, equivalent to \"| tail -n +N | head -N\". Works across all output modes. Defaults to 0.", "required": false, "enum": null, "default": null}, {"name": "multiline", "type": "boolean", "description": "Enable multiline mode where . matches newlines and patterns can span lines (rg -U --multiline-dotall). Default: false.", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 14}, {"name": "ListMcpResourcesTool", "description": "\nList available resources from configured MCP servers.\nEach returned resource will include all standard MCP resource fields plus a 'server' field \nindicating which server the resource belongs to.\n\nParameters:\n- server (optional): The name of a specific MCP server to get resources from. If not provided,\n  resources from all servers will be returned.\n", "category": "MCP Resources", "params": [{"name": "server", "typ o large to read at once.", "required": false, "enum": null, "default": null}, {"name": "limit", "type": "integer", "description": "ONLY include with offset to read a specific slice. OMIT to read the whole file (harness truncates oversized files automatically).", "required": false, "enum": null, "default": null}, {"name": "pages", "type": "string", "description": "Page range for PDF files (e.g., \"1-5\", \"3\", \"10-20\"). Only applicable to PDF files. Maximum 20 pages per request.", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 4}, {"name": "ReadMcpResourceTool", "description": "\nReads a specific resource from an MCP server, identified by server name and resource URI.\n\nParameters:\n- server (required): The name of the MCP server from which to read the resource\n- uri (required): The URI of the resource to read\n", "category": "MCP Resources", "params": [{"name": "server", "type": "string", "description": "The MCP server name", "required": true, "enum": null, "default": null}, {"name": "uri", "type": "string", "description": "The resource URI to read", "required": true, "enum": null, "default": null}], "required_count": 2, "total_params": 2}, {"name": "RemoteTrigger", "description": "Call the claude.ai remote-trigger API. Use this instead of curl — the OAuth token is added automatically in-process and never exposed.\n\nActions:\n- list: GET /v1/code/triggers\n- get: GET /v1/code/triggers/{trigger_id}\n- create: POST /v1/code/triggers (requires body)\n- update: POST /v1/code/triggers/{trigger_id} (requires body, partial update)\n- run: POST /v1/code/triggers/{trigger_id}/run\n\nThe response is the raw JSON from the API.", "category": "Task & Communication", "params": [{"name": "action", "type": "string", "description": "", "required": true, "enum": ["list", "get", "create", "update", "run"], "default": null}, {"name": "trigger_id", "type": "string", "description": "Required for get, update, and run", "required": false, "enum": null, "default": null}, {"name": "body", "type": "object", "description": "JSON body for create and update", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 3}, {"name": "Skill", "description": "Execute a skill within the main conversation\n\nWhen users ask you to perform tasks, check if any of the available skills match. Skills provide specialized capabilities and domain knowledge.\n\nWhen users reference a \"slash command\" or \"/<something>\" (e.g., \"/commit\", \"/review-pr\"), they are referring to a skill. Use this tool to invoke it.\n\nHow to invoke:\n- Use this tool with the skill name and optional arguments\n- Examples:\n  - `skill: \"pdf\"` - invoke the pdf skill\n  - `skill: \"commit\", args: \"-m 'Fix bug'\"` - invoke with arguments\n  - `skill: \"review-pr\", args: \"123\"` - invoke with arguments\n  - `skill: \"ms-office-suite:pdf\"` - invoke using fully qualified name\n\nImportant:\n- Available skills are listed in system-reminder messages in the conversation\n- When a skill matches the user's request, this is a BLOCKING REQUIREMENT: invoke the relevant Skill tool BEFORE generating any other response about the task\n- NEVER mention a skill without actually calling this tool\n- Do not invoke a skill that is already running\n- Do not use this tool for built-in CLI commands (like /help, /clear, etc.)\n- If you see a <command-name> tag in the current conversation turn, the skill has ALREADY been loaded - follow the instructions directly instead of calling this tool again\n", "category": "Orchestration", "params": [{"name": "skill", "type": "string", "description": "The skill name. E.g., \"commit\", \"review-pr\", or \"pdf\"", "required": true, "enum": null, "default": null}, {"name": "args", "type": "string", "description": "Optional arguments for the skill", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 2}, {"name": "TaskOutput", "description": "DEPRECATED: Prefer using the Read tool on the task's output file path instead. Background tasks return their output file path in the tool result, and you receive a <task-notification> with the same path when the task completes — Read that file directly.\n\n- Retrieves output from a running or completed task (background shell, agent, or remote session)\n- Takes a task_id parameter identifying the task\n- Returns the task output along with status information\n- Use block=true (default) to wait for task completion\n- Use block=false for non-blocking check of current status\n- Task IDs can be found using the /tasks command\n- Works with all task types: background shells, async agents, and remote sessions", "category": "Task & Communication", "params": [{"name": "task_id", "type": "string", "description": "The task ID to get output from", "required": true, "enum": null, "default": null}, {"name": "block", "type": "boolean", "description": "Whether to wait for completion", "required": true, "enum": null, "default": true}, {"name": "timeout", "type": "number", "description": "Max wait time in ms", "required": true, "enum": null, "default": 30000}], "required_count": 3, "total_params": 3}, {"name": "TaskStop", "description": "\n- Stops a running background task by its ID\n- Takes a task_id parameter identifying the task to stop\n- Returns a success or failure status\n- Use this tool when you need to terminate a long-running task\n", "category": "Task & Communication", "params": [{"name": "task_id", "type": "string", "description": "The ID of the background task to stop", "required": false, "enum": null, "default": null}, {"name": "shell_id", "type": "string", "description": "Deprecated: use task_id instead", "required": false, "enum": null, "default": null}], "required_count": 0, "total_params": 2}, {"name": "TodoWrite", "description": "Use this tool to create and manage a structured task list for your current coding session. This helps you track progress, organize complex tasks, and demonstrate thoroughness to the user.\nIt also helps the user understand the progress of the task and overall progress of their requests.\n\n## When to Use This Tool\nUse this tool proactively in these scenarios:\n\n1. Complex multi-step tasks - When a task requires 3 or more distinct steps or actions\n2. Non-trivial and complex tasks - Tasks that require careful planning or multiple operations\n3. User explicitly requests todo list - When the user directly asks you to use the todo list\n4. User provides multiple tasks - When users provide a list of things to be done (numbered or comma-separated)\n5. After receiving new instructions - Immediately capture user requirements as todos\n6. When you start working on a task - Mark it as in_progress BEFORE beginning work. Ideally you should only have one todo as in_progress at a time\n7. After completing a task - Mark it as completed and add any new follow-up tasks discovered during implementation\n\n## When NOT to Use This Tool\n\nSkip using this tool when:\n1. There is only a single, straightforward task\n2. The task is trivial and tracking it provides no organizational benefit\n3. The task can be completed in less than 3 trivial steps\n4. The task is purely conversational or informational\n\nNOTE that you should not use this tool if there is only one trivial task to do. In this case you are better off just doing the task directly.\n\n## Examples of When to Use the Todo List\n\n<example>\nUser: I want to add a dark mode toggle to the application settings. Make sure you run the tests and build when you're done!\nAssistant: *Creates todo list with the following items:*\n1. Creating dark mode toggle component in Settings page\n2. Adding dark mode state management (context/store)\n3. Implementing CSS-in-JS styles for dark theme\n4. Updating existing components to support theme switching\n5. Running tests and build process, addressing any failures or errors that occur\n*Begins working on the first task*\n\n<reasoning>\nThe assistant used the todo list because:\n1. Adding dark mode is a multi-step feature requiring UI, state management, and styling changes\n2. The user explicitly requested tests and build be run afterward\n3. The assistant inferred that tests and build need to pass by adding \"Ensure tests and build succeed\" as the final task\n</reasoning>\n</example>\n\n<example>\nUser: Help me rename the function getCwd to getCurrentWorkingDirectory across my project\nAssistant: *Uses grep or search tools to locate all instances of getCwd in the codebase*\nI've found 15 instances of 'getCwd' across 8 different files.\n*Creates todo list with specific items for each file that needs updating*\n\n<reasoning>\nThe assistant used the todo list because:\n1. First, the assistant searched to understand the scope of the task\n2. Upon finding multiple occurrences across different files, it determined this was a complex task with multiple steps\n3. The todo list helps ensure every instance is tracked and updated systematically\n4. This approach prevents missing any occurrences and maintains code consistency\n</reasoning>\n</example>\n\n\n<example>\nUser: I need to implement these features for my e-commerce site: user registration, product catalog, shopping cart, and checkout flow.\nAssistant: *Creates a todo list breaking down each feature into specific tasks based on the project architecture*\nLet's start with user registration. This will involve creating database models, API endpoints, and frontend forms that integrate with your existing authentication system.\n\n<reasoning>\nThe assistant used the todo list because:\n1. The user provided multiple complex features to implement in a comma separated list\n2. The todo list helps organize these large features into manageable tasks\n3. This approach allows for tracking progress across the entire implementation\n</reasoning>\n</example>\n\n<example>\nUser: Can you help optimize my React application? It's rendering slowly and has performance issues.\nAssistant: *Reviews component structure, render patterns, state management, and data fetching*\nAfter analyzing your codebase, I've identified several performance issues.\n*Creates todo list with items like: 1) Implementing memoization for expensive calculations in ProductList, 2) Adding virtualization for long lists in Dashboard, 3) Optimizing image loading in Gallery component, 4) Fixing state update loops in ShoppingCart, 5) Reviewing bundle size and implementing code splitting*\nLet's start by implementing memoization for the expensive calculations in your ProductList component.\n\n<reasoning>\nThe assistant used the todo list because:\n1. First, the assistant examined the codebase to identify specific performance issues\n2. Based on this analysis, it identified multiple optimization opportunities\n3. Performance optimization is a non-trivial task requiring multiple steps\n4. The todo list helps methodically track improvements across different components\n5. This systematic approach ensures all performance bottlenecks are addressed\n</reasoning>\n</example>\n\n## Examples of When NOT to Use the Todo List\n\n<example>\nUser: How do I print 'Hello World' in Python?\nAssistant: In Python, you can print \"Hello World\" with this simple code:\n\npython\nprint(\"Hello World\")\n\nThis will output the text \"Hello World\" to the console when executed.\n\n<reasoning>\nThe assistant did not use the todo list because this is a single, trivial task that can be completed in one step. There's no need to track multiple tasks or steps for such a straightforward request.\n</reasoning>\n</example>\n\n<example>\nUser: What does the git status command do?\nAssistant: The git status command shows the current state of your working directory and staging area. It displays which changes have been staged, which haven't, and which files aren't being tracked by Git. This is a fundamental command for understanding the current state of your repository before making commits.\n\n<reasoning>\nThe assistant did not use the todo list because this is an informational request with no actual coding task to complete. The user is simply asking for an explanation, not for the assistant to perform multiple steps or tasks.\n</reasoning>\n</example>\n\n<example>\nUser: Can you add a comment to the calculateTotal function to explain what it does?\nAssistant: Sure, let me add a comment to the calculateTotal function to explain what it does.\n* Uses the Edit tool to add a comment to the calculateTotal function *\n\n<reasoning>\nThe assistant did not use the todo list because this is a single, straightforward task confined to one location in the code. Adding a comment doesn't require tracking multiple steps or systematic organization.\n</reasoning>\n</example>\n\n<example>\nUser: Run npm install for me and tell me what happens.\nAssistant: I'll run the npm install command for you.\n\n*Executes: npm install*\n\nThe command completed successfully. Here's the output:\n[Output of npm install command]\n\nAll dependencies have been installed according to your package.json file.\n\n<reasoning>\nThe assistant did not use the todo list because this is a single command execution with immediate results. There are no multiple steps to track or organize, making the todo list unnecessary for this straightforward task.\n</reasoning>\n</example>\n\n## Task States and Management\n\n1. **Task States**: Use these states to track progress:\n   - pending: Task not yet started\n   - in_progress: Currently working on (limit to ONE task at a time)\n   - completed: Task finished successfully\n\n   **IMPORTANT**: Task descriptions must have two forms:\n   - content: The imperative form describing what needs to be done (e.g., \"Run tests\", \"Build the project\")\n   - activeForm: The present continuous form shown during execution (e.g., \"Running tests\", \"Building the project\")\n\n2. **Task Management**:\n   - Update task status in real-time as you work\n   - Mark tasks complete IMMEDIATELY after finishing (don't batch completions)\n   - Exactly ONE task must be in_progress at any time (not less, not more)\n   - Complete current tasks before starting new ones\n   - Remove tasks that are no longer relevant from the list entirely\n\n3. **Task Completion Requirements**:\n   - ONLY mark a task as completed when you have FULLY accomplished it\n   - If you encounter errors, blockers, or cannot finish, keep the task as in_progress\n   - When blocked, create a new task describing what needs to be resolved\n   - Never mark a task as completed if:\n     - Tests are failing\n     - Implementation is partial\n     - You encountered unresolved errors\n     - You couldn't find necessary files or dependencies\n\n4. **Task Breakdown**:\n   - Create specific, actionable items\n   - Break complex tasks into smaller, manageable steps\n   - Use clear, descriptive task names\n   - Always provide both forms:\n     - content: \"Fix authentication bug\"\n     - activeForm: \"Fixing authentication bug\"\n\nWhen in doubt, use this tool. Being proactive with task management demonstrates attentiveness and ensures you complete all requirements successfully.\n", "category": "Task & Communication", "params": [{"name": "todos", "type": "array", "description": "The updated todo list", "required": true, "enum": null, "default": null}], "required_count": 1, "total_params": 1}, {"name": "WebFetch", "description": "IMPORTANT: WebFetch WILL FAIL for authenticated or private URLs. Before using this tool, check if the URL points to an authenticated service (e.g. Google Docs, Confluence, Jira, GitHub). If so, look for a specialized MCP tool that provides authenticated access.\n\n- Fetches content from a specified URL and processes it using an AI model\n- Takes a URL and a prompt as input\n- Fetches the URL content, converts HTML to markdown\n- Processes the content with the prompt using a small, fast model\n- Returns the model's response about the content\n- Use this tool when you need to retrieve and e)", "required": true, "enum": null, "default": null}, {"name": "content", "type": "string", "description": "The content to write to the file", "required": true, "enum": null, "default": null}], "required_count": 2, "total_params": 2}, {"name": "mcp__claude_ai_Airtable__create_field", "description": "Creates a new field in an existing Airtable table.\nTo get baseId and tableId, use the search_bases and list_tables_for_base tools first.\nExample: create a singleSelect \"Status\" field:\n{\"baseId\": \"appZfrNIUEip5MazD\", \"tableId\": \"tblGlReoTNWfYnXIG\", \"field\": {\"name\": \"Status\", \"type\": \"singleSelect\", \"options\": {\"choices\": [{\"name\": \"Todo\"}, {\"name\": \"In progress\"}, {\"name\": \"Done\"}]}}}\nExample: create a number \"Priority\" field:\n{\"baseId\": \"appZfrNIUEip5MazD\", \"tableId\": \"tblGlReoTNWfYnXIG\", \"field\": {\"name\": \"Priority\", \"type\": \"number\", \"options\": {\"precision\": 0}}}", "category": "MCP: Airtable", "params": [{"name": "baseId", "type": "string", "description": "The ID of the base containing the table.\nMust start with \"app\" and is 17 characters long.\nExample: \"appZfrNIUEip5MazD\".\nDo not substitute user-facing names for baseId.\nTo get baseId, use the search_bases or list_bases tool.", "required": true, "enum": null, "default": null}, {"name": "tableId", "type": "string", "description": "The ID of the table to create the field in.\nMust start with \"tbl\" and is 17 characters long.\nExample: \"tblGlReoTNWfYnXIG\".\nDo not substitute user-facing names for tableId.\nTo get tableId, use the list_tables_for_base tool.", "required": true, "enum": null, "default": null}, {"name": "field", "type": "?", "description": "", "required": true, "enum": null, "default": null}], "required_count": 3, "total_params": 3}, {"name": "mcp__claude_ai_Airtable__create_records_for_table", "description": "Creates new records in an Airtable table.\nTo get baseId and tableId, use the search_bases and list_tables_for_base tools fi e fields array becomes the primary field of the table.\nExample: create a table called \"Projects\" with singleLineText (Title), number (Priority), singleSelect (Status), and multipleSelects (Tags) fields:\n{\"baseId\": \"appZfrNIUEip5MazD\", \"name\": \"Projects\", \"fields\": [{\"name\": \"Title\", \"type\": \"singleLineText\"}, {\"name\": \"Priority\", \"type\": \"number\", \"options\": {\"precision\": 0}}, {\"name\": \"Status\", \"type\": \"singleSelect\", \"options\": {\"choices\": [{\"name\": \"Todo\"}, {\"name\": \"In progress\"}, {\"name\": \"Done\"}]}}, {\"name\": \"Tags\", \"type\": \"multipleSelects\", \"options\": {\"choices\": [{\"name\": \"Urgent\"}, {\"name\": \"Q1\"}]}}]}", "category": "MCP: Airtable", "params": [{"name": "baseId", "type": "string", "description": "The ID of the base to create the table in.\nMust start with \"app\" and is 17 characters long.\nExample: \"appZfrNIUEip5MazD\".\nDo not substitute user-facing names for baseId.\nTo get baseId, use the search_bases or list_bases tool.", "required": true, "enum": null, "default": null}, {"name": "name", "type": "string", "description": "Must be unique within the base (case-insensitive).", "required": true, "enum": null, "default": null}, {"name": "description", "type": "string", "description": "", "required": false, "enum": null, "default": null}, {"name": "fields", "type": "array", "description": "The first field becomes the primary field and must be one of these types:\n\"singleLineText\", \"email\", \"url\", \"multilineText\", \"number\", \"percent\",\n\"currency\", \"duration\", \"date\", \"dateTime\", \"phoneNumber\", \"barcode\".\nRemaining fields can be any type.", "required": true, "enum": null, "default": null}], "required_count": 3, "total_params": 4}, {"name": "mcp__claude_ai_Airtable__get_table_schema", "description": "Gets the detailed schema information for specified tables and fields in a base.\nThis returns the field ID, type, and config for the specified fields of the specified tables.\nExample: get schema for two fields in a table:\n{\"baseId\": \"appZfrNIUEip5MazD\", \"tables\": [{\"tableId\": \"tblGlReoTNWfYnXIG\", \"fieldIds\": [\"fld8WsrpLHHevsnW8\", \"fldgD18XtsueoiguT\"]}]}", "category": "MCP: Airtable", "params": [{"name": "baseId", "type": "string", "description": "The ID of the base containing the tables.\nMust start with \"app\" and is 17 characters long.\nExample: \"appZfrNIUEip5MazD\".\nDo not substitute user-facing names for baseId.\nTo get baseId, use the search_bases or list_bases tool.", "required": true, "enum": null, "default": null}, {"name": "tables", "type": "array", "description": "An array of table IDs and corresponding field IDs to get schema information for.\nMust start with \"tbl\" and is 17 characters long.\nExample: \"tblGlReoTNWfYnXIG\".\nDo not substitute user-facing names for tableId.\nTo get tableId, use the list_tables_for_base tool.\nField IDs must start with \"fld\" and is 17 characters long.\nExample: \"fldGlRtkBNWfYnPOV\".\nDo not substitute user-facing names for IDs.\nTo get fieldId, use the list_tables_for_base tool.", "required": true, "enum": null, "default": null}], "required_count": 2, "total_params": 2}, {"name": "mcp__claude_ai_Airtable__list_bases", "description": "Lists all bases that you have access to in your Airtable account.\nUse this to get the baseId of the base you want to use.\nFavorited and recently viewed bases are generally more relevant.\nIf the response includes an offset, pass it in a subsequent call to retrieve the next page of results.", "category": "MCP: Airtable", "params": [{"name": "offset", "type": "string", "description": "Pagination cursor from a previous list_bases response. Pass this to retrieve the next page of results.", "required": false, "enum": null, "default": null}], "required_count": 0, "total_params": 1}, {"name": "mcp__claude_ai_Airtable__list_records_for_table", "description": "Lists records queried from an Airtable table.\nDo not assume baseId and tabl
