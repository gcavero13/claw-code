ull, "default": null}, {"name": "pageSize", "type": "integer", "description": "The maximum number of records to return in the response.\nThe server may respond with fewer records than this value when the total set has fewer records than this value.\nDefaults to 1000.", "required": false, "enum": null, "default": null}, {"name": "cursor", "type": "string", "description": "The cursor to start from. To begin from the first record, do not include a cursor.\nFor a subsequent paginated request, include the nextCursor from the previous response.", "required": false, "enum": null, "default": null}, {"name": "sort", "type": "array", "description": "A list of sort objects that specifies how the records will be ordered.\nEach sort object must have a fieldId key specifying the ID of the field to sort on, and an optional direction key that is either \"asc\" or \"desc\".\nThe default direction is \"asc\".\nRecords are sorted by the first sort object first, then by the second sort object for records that have the same value for the first sort, and so on.\nExample sort by a single field in descending order: [{\"fieldId\": \"fld9x4rqyBSCLzsJM\", \"direction\": \"desc\"}]\nExample sort by two fields, first ascending then descending: [{\"fieldId\": \"fld9x4rqyBSCLzsJM\", \"direction\": \"asc\"}, {\"fieldId\": \"fldulcCPDVz87Bmnw\", \"direction\": \"desc\"}]", "required": false, "enum": null, "default": null}, {"name": "recordIds", "type": "array", "description": "An array of record IDs to filter by. Only records with these IDs will be returned.\nMust start with \"rec\" and is 17 characters long.\nExample: \"recZOTa3BDHxlJNzf\".\nDo not substitute user-facing names for IDs\nTo get recordId, use the list_records_for_table tool or display_records_for_table tools.", "required": false, "enum": null, "default": null}, {"name": "filters", "type": "object", "description": "Describes the filters to apply to the records using a structured format.\nExample filter where the value of the field with ID \"fld8WsrpLHHevsnW8\" is \"orange\" or the value of the field with ID \"fldulcCPDVz87Bmnw\" is greater than 5:\n{\"operator\": \"or\", \"operands\": [{\"operator\": \"=\", \"operands\": [\"fld8WsrpLHHevsnW8\", \"orange\"]}, {\"operator\": \">\", \"operands\": [\"fldulcCPDVz87Bmnw\", 5]}]}\nExample filter where the value of the collaborator field with ID \"fldCRi9oz2vRLcIWr\" can be any user in a group with ID \"ugpDUVUnftA7H9bG8\" and the value of the field with ID \"fldgD18XtsueoiguT\" equals select option with ID \"selha8nGNAT5ATR7P\":\n{\"operator\": \"and\", \"operands\": [{\"operator\": \"hasAnyOf\", \"operands\": [\"fldCRi9oz2vRLcIWr\", \"ugpDUVUnftA7H9bG8\"], \"operatorOptions\": {\"matchGroupsByMembership\": true}}, {\"operator\": \"=\", \"operands\": [\"fldgD18XtsueoiguT\", \"selha8nGNAT5ATR7P\"]}]}\nExample filter for records where a date field is within the past week:\n{\"operands\": [{\"operator\": \"isWithin\", \"operands\": [\"fldABC12345678x\", {\"mode\": \"pastWeek\", \"timeZone\": \"America/New_York\"}]}]}\nExample filter for records where a field is not empty:\n{\"operands\": [{\"operator\": \"isNotEmpty\", \"operands\": [\"fldABC12345678x\"]}]}", "required": false, "enum": null, "default": null}], "required_count": 2, "total_params": 8}, {"name": "mcp__claude_ai_Airtable__list_tables_for_base", "description": "Gets the summary of a specific base. This includes the schemas of all tables in the\nbase, including field name and type.\nIf the base is not found or returns a permission error, the user may have interface-only access. Try list_pages_for_base instead.", "category": "MCP: Airtable", "params": [{"name": "baseId", "type": "string", "description": "The ID of the base to get the summary of.\nMust start with \"app\" and is 17 characters long.\nExample: \"appZfrNIUEip5MazD\".\nDo not substitute user-facing names for baseId.\nTo get baseId, use the search_bases or list_bases tool.", "required": true, "enum": null, "default": null}], "required_ rgs:\n    to (Optional[str]): Primary recipient email address(es). For multiple recipients, separate with commas. Can be omitted to save a draft without a recipient yet\n    subject (Optional[str]): Email subject line. Required when threadId is not provided. When threadId is provided and subject is omitted, it is automatically derived from the thread\n    body (str, required): Email body content (plain text or HTML based on contentType)\n    cc (Optional[str]): Carbon copy recipients (comma-separated)\n    bcc (Optional[str]): Blind carbon copy recipients (comma-separated)\n    contentType (Optional[str]): Content type of the email body - \"text/plain\" (default) or \"text/html\"\n    threadId (Optional[str]): Thread ID to reply to. When provided, the draft is created as a reply within that thread\n\nReturns structured data with citation metadata for proper attribution.\n\nThe response includes:\n- draftId: The unique draft ID to use with gmail_send_draft tool\n- messageId: The message ID for reference (DO NOT use this for sending)\n- Other draft details (subject, recipients, etc.)", "category": "MCP: Gmail", "params": [{"name": "to", "type": "string", "description": "Email address of the recipient. Can be omitted to save a draft without a recipient yet", "required": false, "enum": null, "default": null}, {"name": "subject", "type": "string", "description": "Subject line of the email. Required unless threadId is provided (auto-derived from thread)", "required": false, "enum": null, "default": null}, {"name": "body", "type": "string", "description": "Body content of the email", "required": true, "enum": null, "default": null}, {"name": "cc", "type": "string", "description": "CC recipients (comma-separated)", "required": false, "enum": null, "default": null}, {"name": "bcc", "type": "string", "description": "BCC recipients (comma-separated)", "required": false, "enum": null, "default": null}, {"name": "contentType", "type": "string", "description": "Content type of the email body", "required": false, "enum": ["text/plain", "text/html"], "default": "text/plain"}, {"name": "threadId", "type": "string", "description": "Thread ID to reply to. When set, creates the draft as a reply within that thread", "required": false, "enum": null, "default": null}], "required_count": 1, "total_params": 7}, {"name": "mcp__claude_ai_Gmail__gmail_get_profile", "description": "Retrieves your Gmail profile information, including email address and mailbox statistics.\n\nThis tool fetches basic profile data for the currently authenticated Gmail account. Returns structured data with citation metadata for proper attribution.\n\nArgs:\n    None\n\nReturns structured data with citation metadata for proper attribution.", "category": "MCP: Gmail", "params": [], "required_count": 0, "total_params": 0}, {"name": "mcp__claude_ai_Gmail__gmail_list_drafts", "description": "Lists all saved email drafts in your Gmail account with their content and metadata.\n\nThis tool retrieves all unsent email drafts. Returns structured data with citation metadata for proper attribution.\n\nPAGINATION: When you have many drafts, results are paginated:\n1. First call returns drafts and may include nextPageToken\n2. Call again with pageToken to get additional drafts\n3. Continue until no nextPageToken is returned or sufficient results are found\n\nArgs:\n    maxResults (Optional[int]): Maximum number of drafts to return per request. Default: 20\n    pageToken (Optional[str]): Token from previous response to retrieve next page of results\n\nReturns structured data with citation metadata for proper attribution.", "category": "MCP: Gmail", "params": [{"name": "maxResults", "type": "number", "description": "Maximum number of drafts to return", "required": false, "enum": null, "default": 20}, {"name": "pageToken", "type": "string", "description": "Page token to retrieve a specific page of results", "required": false, "enum": null, "default": null}], "required_count": 0, "total_params": 2}, {"name": "mcp__claude_ai_Gmail__gmail_list_labels", "description": "Lists all of the labels in your Gmail account.\n\nReturns both system labels (INBOX, SENT, SPAM, UNREAD, STARRED, etc.) and user-created labels. User labels are mutable — unlike event colors, there's no fixed palette. Use the returned IDs with gmail_modify_thread.\n\nArgs:\n    None\n\nReturns:\n    JSON object with a labels array. Each label has:\n    - id: Label ID (use this with gmail_modify_thread)\n    - name: Display name\n    - type: \"system\" or \"user\"\n    - messageListVisibility / labelListVisibility: UI visibility settings\n\nExamples:\n    - Use when: \"What labels do I have?\" -> gmail_list_labels()\n    - Use when: \"Apply my cal-triage label to this thread\" -> gmail_list_labels() to find the ID, then gmail_modify_thread", "category": "MCP: Gmail", "params": [], "required_count": 0, "total_params": 0}, {"name": "mcp__claude_ai_Gmail__gmail_read_message", "description": "Retrieves the complete content and metadata of a specific Gmail message including headers, body, and attachments information.\n\nThis tool fetches full details of a single email message using its unique ID. Returns structured data with citation metadata for proper attribution.\n\nArgs:\n    messageId (str, required): The unique ID of the message to retrieve (obtained from gmail_search_messages)\n\nReturns structured data with citation metadata for proper attribution.", "category": "MCP: Gmail", "params": [{"name": "messageId", "type": "string", "description": "The ID of the message to retrieve", "required": true, "enum": null, "default": null}], "required_count": 1, "total_params": 1}, {"name": "mcp__claude_ai_Gmail__gmail_read_thread", "description": "Retrieves a complete email conversation thread including all messages in chronological order.\n\nThis tool fetches an entire email thread (conversation) with all its messages. Returns structured data with citation metadata for proper attribution.\n\nArgs:\n    threadId (str, required): The unique ID of the thread to retrieve (obtained from gmail_search_messages)\n\nReturns structured data with citation metadata for proper attribution.", "category": "MCP: Gmail", "params": [{"name": "threadId", "type": "string", "description": "The ID of the thread to retrieve", "required": true, "enum": null, "default": null}], "required_count": 1, "total_params": 1}, {"name": "mcp__claude_ai_Gmail__gmail_search_messages", "description": "Searches Gmail messages using powerful query syntax with support for filtering by sender, recipient, subject, labels, dates, and more.\n\nThis tool provides access to Gmail's full search capabilities. Returns structured data with citation metadata for proper attribution.\n\nGMAIL SEARCH SYNTAX:\n- from:sender@example.com - Messages from specific sender\n- to:recipient@example.com - Messages to specific recipient\n- subject:meeting - Messages with \"meeting\" in subject\n- is:unread - Unread messages\n- is:starred - Starred messages\n- label:important - Messages with specific label\n- has:attachment - Messages with attachments\n- after:2024/1/1 before:2024/12/31 - Date range\n- \"exact phrase\" - Exact phrase match\n- OR operator: from:alice@example.com OR from:bob@example.com\n- Exclude with minus: -from:spam@example.com\n- Combine multiple: is:unread from:boss@company.com has:attachment\n\nPAGINATION: Results are limited per request. Use pagination for complete results:\n1. First call returns messages and may include nextPageToken\n2. Call again with pageToken parameter to get next batch\n3. Continue until no nextPageToken is returned or sufficient results are found\n\nArgs:\n    q (Optional[str]): Gmail search query using standard Gmail search syntax. If omitted, returns most recent messages\n    pageToken (Optional[str]): Token from previous response to retrieve next page of results\n    maxResults (Optional[int]): Maximum messages to return per request (1-500). Default: 20\n    includeSpamTrash (Optional[bool]): Include messages from SPAM and TRASH folders. Default: false\n\nReturns structured data with citation metadata for proper attribution.", "category": "MCP: Gmail", "params": [{"name": "q", "type": "string", "description": "Query string using Gmail search syntax. Examples: \"from:user@example.com\", \"is:unread\", \"subject:meeting\"", "required": false, "enum": null, "default": null}, {"name": "pageToken", "type": "string", "description": "Page token to retrieve a specific page of results", "required": false, "enum": null, "default": null}, {"name": "maxResults", "type": "number", "description": "Maximum number of messages to return (max: 500)", "required": false, "enum": null, "default": 20}, {"name": "includeSpamTrash", "type": "boolean", "description": "Include messages from SPAM and TRASH", "required": false, "enum": null, "default": false}], "required_count": 0, "total_params": 4}, {"name": "mcp__claude_ai_Google_Calendar__gcal_create_event", "description": "Creates a new event on a Google Calendar with comprehensive details including attendees, reminders, and recurrence rules.\n\nThis tool creates calendar events with full customization options. The event organizer is automatically set to the authenticated account. Note: explicitly add organizer email to the attendees array.\n\nConference rooms and resources can be booked by adding them as attendees with resource: true. First use gcal_list_calendars to find available resource calendars (they have IDs ending in @resource.calendar.google.com), then check their availability with gcal_find_meeting_times before booking.\n\nArgs:\n    calendarId (str): The calendar ID where the event will be created. Default: 'primary' (user's main calendar)\n    event (object): Event details object with the following structure:\n        - summary (str, required): Event title/name\n        - description (Optional[str]): Detailed event description\n        - location (Optional[str]): Event location (physical address or meeting link)\n        - start (object, required): Event start time with one of:\n            - dateTime (str): Start timestamp in RFC3339 format (e.g., 'YYYY-MM-DDTHH:MM:SSZ' for UTC, 'YYYY-MM-DDTHH:MM:SS-07:00' for PDT)\n            - date (str): For all-day events in YYYY-MM-DD format (e.g., 'YYYY-MM-DD')\n            - timeZone (Optional[str]): IANA timezone (e.g., 'America/Los_Angeles')\n        - end (object, required): Event end time with same format as start\n        - attendees (Optional[array]): List of attendees including people and resources. Each attendee should have:\n            - email (str): Attendee's email address (for conference rooms, use their @resource.calendar.google.com email)\n            - displayName (Optional[str]): Attendee's display name\n            - optional (Optional[bool]): Whether attendance is optional\n            - organizer (Optional[bool]): Set to true to indicate this attendee is the organizer\n        - recurrence (Optional[array[str]]): RRULE strings for recurring events (e.g., ['RRULE:FREQ=WEEKLY;BYDA… [truncated]", "category": "MCP: Google Calendar", "params": [{"name": "calendarId", "type": "string", "description": "The calendar ID to create the event in", "required": false, "enum": null, "default": "primary"}, {"name": "event", "type": "object", "description": "Event data", "required": true, "enum": null, "default": null}, {"name": "sendUpdates", "type": "string", "description": "Whether to send notifications: 'all' (default), 'externalOnly', or 'none'", "required": false, "enum": ["all", "externalOnly", "none"], "default": null}], "required_count": 1, "total_params": 3}, {"name": "mcp__claude_ai_Google_Calendar__gcal_delete_event", "description": "Permanently deletes a calendar event with automatic attendee notification.\n\nThis tool removes an event from Google Calendar. If you're the organizer, all attendees will receive cancellation notifications. This action is irreversible - the event cannot be recovered once deleted.\n\nArgs:\n    calendarId (str, required): The calendar containing the event (e.g., 'primary' or specific calendar ID)\n    eventId (str, required): The unique ID of the event to delete (obtained from gcal_list_events or gcal_get_event)\n\nReturns:\n    str: Confirmation message indicating:\n    - Event successfully deleted\n    - Event ID for reference\n    - Whether cancellation notices were sent to attendees\n\nExamples:\n    - Use when: \"Cancel meeting abc123def\" -> gcal_delete_event(calendarId=\"primary\", eventId=\"abc123def\")\n    - Use when: \"Remove the event xyz789 from my work calendar\" -> gcal_delete_event(calendarId=\"work@company.com\", eventId=\"xyz789\")\n    - Use when: \"Delete the duplicate appointment\" -> First find the duplicate with gcal_list_events, then delete it\n    - Don't use when: You want to decline an invitation (use gcal_respond_to_event with 'declined' instead)\n    - Don't use when: You want to hide an event but keep the record (no hiding feature - consider updating description to mark as cancelled)\n\nImportant Notes:\n    - Deleting a recurring event deletes ALL occurrences\n    - If you're the organizer, attendees receive cancellation emails automatically\n    - If you're not the organizer, only your copy is removed (event remains for others)\n    - Deleted events cannot be restored - consider updating the event instead if unsure\n\nError Handling:\n    - Returns error if event doesn't exist or was already deleted\n    - Returns error if you don't have permission to delete the event\n    - Handles calendar access errors gracefully\n    - Provides clear message if attempting to delete events from read-only calendars", "category": "MCP: Google Calendar", "params": [{"name": "calendarId", "type": "string", "description": "The ID of the calendar containing the event", "required": true, "enum": null, "default": null}, {"name": "eventId", "type": "string", "description": "The ID of the event to delete", "required": true, "enum": es available\n\n    Option 3: Apr 5, 2026\n    ⏰ 9:00 AM - 10:00 AM (PDT)\n    ✅ All 4 attendees available\n\n    --- SEARCH SUMMARY ---\n    Checked availability for: alice@example.com, bob@example.com, carol@example.com\n    Time r… [truncated]", "category": "MCP: Google Calendar", "params": [{"name": "attendees", "type": "array", "description": "Email addresses of people to check availability for", "required": true, "enum": null, "default": null}, {"name": "duration", "type": "number", "description": "Required meeting duration in minutes", "required": true, "enum": null, "default": null}, {"name": "timeMin", "type": "string", "description": "Start of time range to search (RFC3339 timestamp without timezone, e.g., YYYY-MM-DDTHH:MM:SS)", "required": true, "enum": null, "default": null}, {"name": "timeMax", "type": "string", "description": "End of time range to search (RFC3339 timestamp without timezone, e.g., YYYY-MM-DDTHH:MM:SS)", "required": true, "enum": null, "default": null}, {"name": "timeZone", "type": "string", "description": "Time zone that will be used to parse timeMin and timeMax and for the results (IANA Time Zone Database name)", "required": false, "enum": null, "default": null}, {"name": "preferences", "type": "object", "description": "Scheduling preferences", "required": false, "enum": null, "default": null}], "required_count": 4, "total_params": 6}, {"name": "mcp__claude_ai_Google_Calendar__gcal_find_my_free_time", "description": "Identifies free time slots in your personal calendar(s) where no events are scheduled.\n\nThis tool analyzes your calendar(s) to find gaps between events, helping you identify available time for focused work, personal tasks, or new meetings. Only checks calendars you specify - does not check other people's availability.\n\nArgs:\n    calendarIds (array[str], required): List of your calendar IDs to check (e.g., ['primary', 'work@company.com'])\n    timeMin (str, required): Start of range to check (RFC3339 timestamp without itation", "required": true, "enum": ["accepted", "declined", "tentative"], "default": null}, {"name": "comment", "type": "string", "description": "Optional comment to send with your response", "required": false, "enum": null, "default": null}, {"name": "sendUpdates", "type": "string", "description": "Whether to send notification emails", "required": false, "enum": ["all", "externalOnly", "none"], "default": "all"}], "required_count": 2, "total_params": 5}, {"name": "mcp__claude_ai_Google_Calendar__gcal_update_event", "description": "Updates an existing calendar event with new information while preserving unchanged fields.\n\nThis tool modifies existing events on Google Calendar. Only include the fields you want to change - all other fields remain unchanged. When updating attendees, you must provide the complete list (both existing attendees you want to keep and new ones to add).\n\nArgs:\n    calendarId (str, required): The calendar containing the event (e.g., 'primary' or specific calendar ID)\n    eventId (str, required): The unique ID of the event to update (obtained from gcal_list_events or gcal_create_event)\n    event (object): Fields to update (only include what you want to change):\n        - summary (Optional[str]): New event title/name\n        - description (Optional[str]): New event description\n        - location (Optional[str]): New location (physical address or meeting link)\n        - start (Optional[object]): New start time with:\n            - dateTime (Optional[str]): Timestamp in RFC3339 format (e.g., 'YYYY-MM-DDTHH:MM:SSZ')\n            - date (Optional[str]): For all-day events (YYYY-MM-DD)\n            - timeZone (Optional[str]): IANA timezone\n        - end (Optional[object]): New end time (same format as start)\n        - attendees (Optional[array]): COMPLETE list of attendees including people and resources (include both existing and new):\n            - email (str): Attendee's email (for conference rooms, use @resource.calendar.google.com e
